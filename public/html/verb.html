<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Detalhe do Verbo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Fredoka', Arial, sans-serif; background: linear-gradient(135deg, #f5e6d3, #fffbe6); color: #333; min-height: 100vh; }
    .verb-page { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 3px solid #e8c98e; padding-bottom: 1rem; }
    h1 { font-size: 2rem; color: #5a3d2b; }
    .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
    
    .container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; align-items: start; }
    
    /* Verbonio */
    .verbonio-section { background: linear-gradient(135deg, #fff9e6 0%, #fffbe6 100%); padding: 1.5rem; border-radius: 12px; border: 3px solid #e8c98e; box-shadow: 0 8px 24px rgba(90, 61, 43, 0.15); }
    .verbonio-char { font-size: 80px; text-align: center; margin-bottom: 1rem; animation: bounce 1s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    .verbonio-text { font-size: 1rem; color: #5a3d2b; line-height: 1.6; }
    .verbonio-intro { color: #ff8a5b; font-weight: 700; margin-bottom: 0.5rem; }
    .verbonio-speech { color: #6b4f3a; background: #fffbe6; padding: 1rem; border-radius: 8px; border-left: 4px solid #ff8a5b; margin-top: 0.5rem; }
    
    /* Conteúdo */
    .verb-content { }
    .verb-info { background: #fff; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .verb-type { font-weight: 700; color: #5a3d2b; margin-bottom: 0.5rem; font-size: 1.1rem; }
    .verb-label { color: #8b6f47; font-size: 0.9rem; margin-top: 1rem; margin-bottom: 0.3rem; font-weight: 600; }
    .verb-usage { color: #6b4f3a; margin: 0.5rem 0; line-height: 1.6; }
    .verb-examples { background: #fffbe6; padding: 1.5rem; border-radius: 8px; border: 2px solid #e8c98e; margin-bottom: 1.5rem; }
    .verb-examples h3 { margin-bottom: 1rem; color: #5a3d2b; }
    #verb-examples-list { color: #6b4f3a; line-height: 1.8; }
    #verb-examples-list li { margin-bottom: 0.8rem; color: #6b4f3a; font-size: 0.95rem; list-style: none; padding-left: 0.5rem; }
    #verb-examples-list li:before { content: "📌 "; margin-right: 0.5rem; }
    .verb-examples p { margin: 0.5rem 0; color: #6b4f3a; }
    .actions { display: flex; gap: 0.5rem; }
    button, a { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; }
    .btn-back { background: #f5a623; color: white; }
    .btn-back:hover { background: #e8941f; }
    
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      h1 { font-size: 1.5rem; }
      .verbonio-char { font-size: 60px; }
    }
  </style>
</head>
<body>
  <div class="verb-page">
    <header>
      <h1 id="verb-page-title">Verbo</h1>
      <button class="close-btn" onclick="window.close()" aria-label="Fechar">✖</button>
    </header>

    <div class="container">
      <!-- Verbonio à esquerda -->
      <div class="verbonio-section">
        <div class="verbonio-char">🧙‍♂️</div>
        <div class="verbonio-text">
          <p class="verbonio-intro">Verbonio diz:</p>
          <div class="verbonio-speech" id="verbonio-speech">
            Clicando para aprender sobre este verbo...
          </div>
        </div>
      </div>

      <!-- Conteúdo à direita -->
      <div class="verb-content">
        <div class="verb-info">
          <p class="verb-type" id="verb-type"></p>
          
          <p class="verb-label">Quando usar:</p>
          <p class="verb-usage" id="verb-usage"></p>
          
          <div class="verb-examples">
            <h3>Exemplos</h3>
            <div id="verb-examples-list">Carregando...</div>
          </div>

          <div class="actions">
            <a href="/menu.html" class="btn-back">← Voltar ao menu</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/verb.js"></script>
</body>
</html>
